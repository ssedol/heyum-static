services:
  heyum-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: heyum-static-dev
    ports:
      - "${PORT:-5173}:5173"
    environment:
      PORT: "5173"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - heyum_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  heyum_node_modules:
